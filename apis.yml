aid: sailpoint
name: SailPoint
description: >-
  Enterprise identity security and governance platform providing identity management,
  access governance, and compliance solutions for workforce and non-employee identities.
  SailPoint delivers cloud-native IAM, certification automation, role mining, AI-driven
  recommendations, and developer-friendly APIs for integrating identity into any workflow.
type: Index
x-type: company
position: Consumer
access: 3rd-Party
image: https://www.sailpoint.com/wp-content/uploads/2021/02/sailpoint-logo.svg
tags:
  - Access Governance
  - Compliance
  - IAM
  - Identity Management
  - Identity Security
  - Security
created: '2025-02-17'
modified: '2026-05-02'
url: https://raw.githubusercontent.com/api-evangelist/sailpoint/refs/heads/main/apis.yml
specificationVersion: '0.19'
