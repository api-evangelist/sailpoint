        idempotent: true
      call: identity-security-cloud-v3-identities.updateidentityprofile
      with:
        identity-profile-id: tools.identity-profile-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-identity-profile
      description: Delete an identity profile
      hints:
        readOnly: false
