openapi: 3.1.0
info:
  title: Identity Security Cloud V3 API
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to
    achieve repeatable, automated processes with greater scalability. The V3
    APIs provide core endpoints covering access profiles, certifications,
    identities, roles, search, sources, transforms, workflows, and more.
    We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers
    using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
    identifier: MIT
  version: 3.0.0
servers:
  - url: https://{tenant}.api.identitynow.com/v3
    description: Production API server.
    variables:
      tenant:
        default: sailpoint
        description: >-
          The name of your tenant, typically your company's name.
  - url: https://{apiUrl}/v3
    description: V3 API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: The API URL of your tenant.
security:
  - oauth2: []
  - personalAccessToken: []
tags:
  - name: Identities
    description: >-
      Use this API to retrieve and manage public identity information. Public
      identities represent users within the Identity Security Cloud platform,
      including their attributes, lifecycle state, and manager relationships.
    externalDocs:
      description: SailPoint Identities Documentation
      url: https://developer.sailpoint.com/docs/api/v3/get-public-identities/
  - name: Access Profiles
    description: >-
      Use this API to implement and customize access profile functionality.
      Access profiles group entitlements, which represent access rights on
      sources. For example, an Active Directory source can have multiple
      entitlements grouped into an access profile such as 'AD Developers'
      combining 'Employees' and 'Developers' entitlements. Access profiles
      are used in provisioning, certifications, access requests, and roles.
    externalDocs:
      description: SailPoint Access Profiles Documentation
      url: https://developer.sailpoint.com/docs/api/v3/access-profiles/
  - name: Roles
    description: >-
      Use this API to implement and customize role functionality. Roles represent
      the broadest level of access and group one or more access profiles. When
      you create a role and configure it with role criteria, Identity Security
      Cloud can automatically assign the role to qualified identities. Roles
      simplify access management for organizational positions.
    externalDocs:
      description: SailPoint Roles Documentation
      url: https://developer.sailpoint.com/docs/api/v3/roles/
  - name: Certifications
    description: >-
      Use this API to implement certification functionality. Certifications
      enable administrators and designated reviewers to review users' access
      to entitlements and decide whether to approve, revoke, or reassign
      the review. Certification campaigns provide a structured process for
      periodic access reviews and compliance verification.
    externalDocs:
      description: SailPoint Certifications Documentation
      url: https://developer.sailpoint.com/docs/api/v3/certifications/
paths:
  /public-identities:
    get:
      operationId: getPublicIdentities
      tags:
        - Identities
      summary: List public identities
      description: >-
        Get a list of public identities. This endpoint returns a paged list
        of public identity objects that can be filtered and sorted.
      parameters:
        - name: add-core-filters
          in: query
          description: >-
            Set to true to exclude incomplete identities and uncorrelated
            accounts from the results.
          required: false
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Count'
        - name: filters
          in: query
          description: >-
            Filter results using the standard syntax described in V3 API
            Standard Collection Parameters. Filtering is supported for
            the following fields and operators: id (eq, in), name (eq, sw,
            co), alias (eq, sw, co), email (eq, sw, co), status (eq).
          required: false
          schema:
            type: string
          example: name eq "John Smith"
        - name: sorters
          in: query
          description: >-
            Sort results using the standard syntax. Sorting is supported
            for the following fields: name, alias, email.
          required: false
          schema:
            type: string
          example: name,-email
      responses:
        '200':
          description: List of public identities.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicIdentity'
          headers:
            X-Total-Count:
              description: Total number of results matching the query.
              schema:
                type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:identity:read'
  /public-identities/{id}:
    get:
      operationId: getPublicIdentity
      tags:
        - Identities
      summary: Get a public identity
      description: >-
        Get the details of a public identity by its ID.
      parameters:
        - name: id
          in: path
          description: The identity ID.
          required: true
          schema:
            type: string
          example: 2c9180857182305e0171993735622948
      responses:
        '200':
          description: A public identity object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicIdentity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:identity:read'
  /identity-profiles:
    get:
      operationId: listIdentityProfiles
      tags:
        - Identities
      summary: List identity profiles
      description: >-
        Get a list of identity profiles. Identity profiles define how
        identity attributes are mapped from source account attributes and
        configure lifecycle states.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Count'
        - name: filters
          in: query
          description: >-
            Filter results using the standard syntax. Filtering is
            supported for the following fields: id (eq, in), name (eq, sw),
            priority (eq, gt, lt, ge, le).
          required: false
          schema:
            type: string
          example: name eq "HR Profile"
        - name: sorters
          in: query
          description: >-
            Sort results using the standard syntax. Sorting is supported
            for the following fields: name, priority, created, modified.
          required: false
          schema:
            type: string
          example: name,-priority
      responses:
        '200':
          description: List of identity profiles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdentityProfile'
          headers:
            X-Total-Count:
              description: Total number of results matching the query.
              schema:
                type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:identity-profile:read'
    post:
      operationId: createIdentityProfile
      tags:
        - Identities
      summary: Create an identity profile
      description: >-
        Create an identity profile. An identity profile defines the mapping
        between source account attributes and identity attributes and
        configures lifecycle states for identities.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityProfile'
      responses:
        '201':
          description: Identity profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:identity-profile:manage'
  /identity-profiles/{identity-profile-id}:
    get:
      operationId: getIdentityProfile
      tags:
        - Identities
      summary: Get an identity profile
      description: >-
        Get the details of an identity profile by its ID.
      parameters:
        - name: identity-profile-id
          in: path
          description: The identity profile ID.
          required: true
          schema:
            type: string
          example: 2b838de9-db9b-abcf-e646-d4f274ad4238
      responses:
        '200':
          description: An identity profile object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:identity-profile:read'
    patch:
      operationId: updateIdentityProfile
      tags:
        - Identities
      summary: Update an identity profile
      description: >-
        Update an existing identity profile using a JSON Patch document.
      parameters:
        - name: identity-profile-id
          in: path
          description: The identity profile ID.
          required: true
          schema:
            type: string
          example: 2b838de9-db9b-abcf-e646-d4f274ad4238
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/JsonPatchOperation'
      responses:
        '200':
          description: Updated identity profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:identity-profile:manage'
    delete:
      operationId: deleteIdentityProfile
      tags:
        - Identities
      summary: Delete an identity profile
      description: >-
        Delete an identity profile by its ID.
      parameters:
        - name: identity-profile-id
          in: path
          description: The identity profile ID.
          required: true
          schema:
            type: string
          example: 2b838de9-db9b-abcf-e646-d4f274ad4238
      responses:
        '202':
          description: >-
            Identity profile delete request accepted. This is a long-running
            asynchronous operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResultSimplified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:identity-profile:manage'
  /access-profiles:
    get:
      operationId: listAccessProfiles
      tags:
        - Access Profiles
      summary: List access profiles
      description: >-
        Get a list of access profiles. When you filter for access profiles
        that have the '+' symbol in their names, the response is blank.
      parameters:
        - name: for-subadmin
          in: query
          description: >-
            Filters the returned list according to what is visible to the
            indicated ROLE_SUBADMIN or SOURCE_SUBADMIN identity. The value
            is either an identity ID or the special value 'me' for the
            calling identity's ID.
          required: false
          schema:
            type: string
          example: 8c190e6787aa4ed9a90bd9d5344523fb
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Count'
        - name: filters
          in: query
          description: >-
            Filter results using the standard syntax. Filtering is
            supported for the following fields and operators: id (eq, in),
            name (eq, sw), created (gt, ge, le), modified (gt, lt, ge, le),
            owner.id (eq, in), requestable (eq), source.id (eq, in).
            Supported composite operators are 'and' and 'or'.
          required: false
          schema:
            type: string
          example: name eq "SailPoint Support"
        - name: sorters
          in: query
          description: >-
            Sort results using the standard syntax. Sorting is supported
            for the following fields: name, created, modified.
          required: false
          schema:
            type: string
          example: name,-modified
        - name: for-segment-ids
          in: query
          description: >-
            Filters access profiles to only those assigned to the
            segment(s) with the specified IDs. If segmentation is
            unavailable, specifying this parameter results in an error.
          required: false
          schema:
            type: string
          example: 0b5c9f25-83c6-4762-9073-e38f7bb2ae26,2e8d8180-24bc-4d21-91c6-7affdb473b0d
        - name: include-unsegmented
          in: query
          description: >-
            Indicates whether the response should include unsegmented
            access profiles. If for-segment-ids is absent or empty,
            specifying this as false results in an error.
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: List of access profiles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessProfile'
          headers:
            X-Total-Count:
              description: Total number of results matching the query.
              schema:
                type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:access-profile:read'
    post:
      operationId: createAccessProfile
      tags:
        - Access Profiles
      summary: Create an access profile
      description: >-
        Create an access profile. A user with ROLE_SUBADMIN or
        SOURCE_SUBADMIN authority must be associated with the access
        profile's source. The maximum supported length for the description
        field is 2000 characters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessProfile'
      responses:
        '201':
          description: Access profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:access-profile:manage'
            - 'idn:entitlement:read'
            - 'idn:identity:read'
            - 'idn:sources:read'
  /access-profiles/{id}:
    get:
      operationId: getAccessProfile
      tags:
        - Access Profiles
      summary: Get an access profile
      description: >-
        Get an access profile by its ID.
      parameters:
        - name: id
          in: path
          description: The access profile ID.
          required: true
          schema:
            type: string
          example: 2c91808a7190d06e01719938fcd20792
      responses:
        '200':
          description: An access profile object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:access-profile:read'
    patch:
      operationId: patchAccessProfile
      tags:
        - Access Profiles
      summary: Patch an access profile
      description: >-
        Update an existing access profile using a JSON Patch document. The
        maximum supported length for the description field is 2000 characters.
      parameters:
        - name: id
          in: path
          description: The access profile ID.
          required: true
          schema:
            type: string
          example: 2c91808a7190d06e01719938fcd20792
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/JsonPatchOperation'
      responses:
        '200':
          description: Updated access profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:access-profile:manage'
    delete:
      operationId: deleteAccessProfile
      tags:
        - Access Profiles
      summary: Delete an access profile
      description: >-
        Delete an existing access profile by its ID. The access profile
        must not be in use by any roles.
      parameters:
        - name: id
          in: path
          description: The access profile ID.
          required: true
          schema:
            type: string
          example: 2c91808a7190d06e01719938fcd20792
      responses:
        '204':
          description: Access profile deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:access-profile:manage'
  /access-profiles/{id}/entitlements:
    get:
      operationId: listAccessProfileEntitlements
      tags:
        - Access Profiles
      summary: List access profile entitlements
      description: >-
        Get a list of entitlements associated with the specified access profile.
      parameters:
        - name: id
          in: path
          description: The access profile ID.
          required: true
          schema:
            type: string
          example: 2c91808a7190d06e01719938fcd20792
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Count'
        - name: filters
          in: query
          description: >-
            Filter results using the standard syntax. Filtering is
            supported for the following fields: name (eq, sw).
          required: false
          schema:
            type: string
        - name: sorters
          in: query
          description: >-
            Sort results using the standard syntax. Sorting is supported
            for the following fields: name, created, modified.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of entitlements for the access profile.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entitlement'
          headers:
            X-Total-Count:
              description: Total number of results matching the query.
              schema:
                type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:access-profile:read'
  /access-profiles/bulk-delete:
    post:
      operationId: bulkDeleteAccessProfiles
      tags:
        - Access Profiles
      summary: Bulk delete access profiles
      description: >-
        Delete one or more access profiles in a single request. The access
        profiles must not be in use by any roles or applications. Returns
        details about which profiles were deleted and which failed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessProfileBulkDeleteRequest'
      responses:
        '200':
          description: Bulk delete results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessProfileBulkDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:access-profile:manage'
  /roles:
    get:
      operationId: listRoles
      tags:
        - Roles
      summary: List roles
      description: >-
        Get a paged list of roles. Roles represent the broadest level of
        access and group one or more access profiles.
      parameters:
        - name: for-subadmin
          in: query
          description: >-
            Filters the returned list according to what is visible to the
            indicated ROLE_SUBADMIN identity. The value is either an
            identity ID or 'me' for the calling identity.
          required: false
          schema:
            type: string
          example: 5168015d32f890ca15812c9180835d2e
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Count'
        - name: filters
          in: query
          description: >-
            Filter results using the standard syntax. Filtering is
            supported for the following fields and operators: id (eq, in),
            name (eq, sw), created (gt, ge, le), modified (gt, lt, ge, le),
            owner.id (eq, in), requestable (eq).
          required: false
          schema:
            type: string
          example: name sw "Role"
        - name: sorters
          in: query
          description: >-
            Sort results using the standard syntax. Sorting is supported
            for the following fields: name, created, modified.
          required: false
          schema:
            type: string
          example: name,-modified
        - name: for-segment-ids
          in: query
          description: >-
            Filters roles to only those assigned to the segment(s) with
            the specified IDs.
          required: false
          schema:
            type: string
        - name: include-unsegmented
          in: query
          description: >-
            Indicates whether the response should include unsegmented roles.
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: List of roles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
          headers:
            X-Total-Count:
              description: Total number of results matching the query.
              schema:
                type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - 'idn:role-unchecked:read'
    post:
      operationId: createRole
      tags:
        - Roles
      summary: Create a role
      description: >-
        Create a role. The maximum supported length for the description
        field is 2000 characters. ROLE_SUBADMIN users cannot create roles
        with access profiles from sources outside their authorization scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
      responses:
