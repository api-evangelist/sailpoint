specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SailPoint
providerId: sailpoint
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Identity Security
  - IAM
  - Access Governance
  - Compliance
  - B2B
description: SailPoint Identity Security Cloud is an enterprise IGA platform sold under annual subscription
  contracts sized by identity counts and module mix (Standard / Business / Business Plus). Public marketing
  pages do not list per-identity prices; commercial terms are negotiated through SailPoint sales.
sources:
  - https://www.sailpoint.com/products/identity-security-cloud
  - https://developer.sailpoint.com/docs/api/getting-started
notes: SailPoint does not publish per-identity / per-seat prices in the public surface. Plan tiers (Standard,
  Business, Business Plus, plus add-on suites for AI, Non-Employee, Data Access Security) are referenced
  in marketing but not priced. This artifact is intentionally a single Contact Sales plan.
plans:
  - id: sailpoint-contact-sales
    name: Contact Sales
    type: enterprise
    description: Annual subscription to SailPoint Identity Security Cloud, sized by identity count, module
      tier (Standard / Business / Business Plus), and add-on capabilities. API access to V3 endpoints
      is included with a paid subscription, subject to documented rate limits.
    entries:
      - label: Identity Security Cloud Subscription
        name: subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Standard / Business / Business Plus tiers
      - name: V3 REST API access (100 req / 10s per access_token rate limit)
      - name: Connectors and source integrations
      - name: Access certification and policy modules
      - name: Add-on suites (AI, Non-Employee Risk Management, Data Access Security)
maintainers:
